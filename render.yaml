services:
  # 1. Backend Web Service
  - type: web
    name: return-system-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    preDeployCommand: npx prisma db push && npm run db:seed:prod
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  # 2. Frontend Static Site
  - type: web
    name: return-system-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
